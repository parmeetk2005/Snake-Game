<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <div class="hud">
        <p>Score: <span id="score">0</span></p>
        <p id="status">Running</p>
      </div>

      <canvas id="board" width="400" height="400" aria-label="Snake board"></canvas>

      <div class="actions">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </div>

      <div class="controls" aria-label="On-screen controls">
        <button type="button" data-dir="UP">↑</button>
        <div class="controls-row">
          <button type="button" data-dir="LEFT">←</button>
          <button type="button" data-dir="DOWN">↓</button>
          <button type="button" data-dir="RIGHT">→</button>
        </div>
      </div>
    </main>

    <script type="module" src="./snake.js"></script>
  </body>
</html>
